name: release

# Canonical Lightwave release workflow — one .github/workflows/release.yml per repo.
#
# release-please is the engine: on every merge to main it maintains a "release
# PR" accumulating conventional commits (feat/fix/…). Merging that PR bumps the
# version, updates CHANGELOG.md, tags vX.Y.Z, and cuts a GitHub Release. The
# `release` job then builds binaries + pushes the Homebrew formula via GoReleaser,
# uploading to the release release-please just created (.goreleaser.yaml sets
# `release.mode: keep-existing` so the two don't fight over the release body).
#
# Migrated from the previous tag-triggered flow: developers no longer `git tag`
# by hand — merge the release PR instead. (A release-please GITHUB_TOKEN-created
# tag wouldn't re-trigger a tag-listening workflow anyway, so GoReleaser runs
# in-line on release_created.)
on:
  push:
    branches: [main]
  # Manual escape hatch: retrigger GoReleaser for an existing release tag when
  # the automated run failed (e.g. tag-format mismatch, transient network error).
  # Usage: gh workflow run release.yml -f tag=lightwave-cli-v3.3.0
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. lightwave-cli-v3.3.0 or v3.3.0)"
        required: true

# Serialize back-to-back main merges; don't cancel a release mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

# Least privilege: deny by default at the workflow level; each job opts in.
permissions: {}

jobs:
  release-please:
    # Skip on manual dispatch — release-please has already run for this tag.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [release-please]
    if: |
      always() &&
      (
        (github.event_name == 'push' && needs.release-please.outputs.release_created) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # On push: use the tag release-please just created.
      # On workflow_dispatch: use the manually supplied tag input.
      - name: Resolve tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.tag }}"
          else
            RAW="${{ needs.release-please.outputs.tag_name }}"
          fi
          # Strip any component prefix (e.g. "lightwave-cli-v3.3.0" → "v3.3.0").
          # include-component-in-tag: false in release-please-config.json prevents
          # this going forward; the strip is a permanent safety net.
          SEMVER="v${RAW##*-v}"
          echo "raw=${RAW}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      # Build from the exact commit the release tag points to.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-tag.outputs.raw }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Mint a short-lived installation token for the lightwave-tap-publisher
      # GitHub App, scoped to just homebrew-tap. Token auto-rotates per run —
      # nothing to renew. Provision TAP_APP_ID + TAP_APP_PRIVATE_KEY once:
      #   mise run release-setup-tap-app
      - name: Mint tap-push token
        id: tap-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: lightwave-media
          repositories: homebrew-tap

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "v2.14.3"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
          GORELEASER_CURRENT_TAG: ${{ steps.resolve-tag.outputs.semver }}

      - name: Upload darwin binaries for notarization
        # Required input for the sign-macos workflow (when activated).
        # Leaving the upload active even when notarization is disabled
        # is harmless — the artifacts expire in 7 days.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lw_darwin_amd64
          path: dist/lw_darwin_amd64_v1/lw
          retention-days: 7
          if-no-files-found: warn

      - name: Upload darwin/arm64 binary for notarization
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lw_darwin_arm64
          path: dist/lw_darwin_arm64_v8.0/lw
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # macOS notarization (dormant — activate per docs/release-notarization.md)
  #
  # Uncomment the block below + provision the five MACOS_* repo secrets,
  # and releases will publish notarized darwin binaries that don't trigger
  # the syspolicyd reputation-check hang documented in CLAUDE.md (the one
  # that breaks `lw` invocations from project hooks on fresh macOS installs).
  # ---------------------------------------------------------------------
