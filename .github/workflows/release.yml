name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2.10.0). Must already exist on origin."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Mint a short-lived installation token for the lightwave-tap-publisher
      # GitHub App, scoped to just homebrew-tap. Replaces the expiring
      # HOMEBREW_TAP_TOKEN PAT: GoReleaser pushes the formula bump as the
      # app[bot], the token auto-rotates per run, and there is nothing to
      # renew. Provision TAP_APP_ID + TAP_APP_PRIVATE_KEY as repo secrets
      # (see docs/release-tap-app.md).
      - name: Mint tap-push token
        id: tap-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: lightwave-media
          repositories: homebrew-tap

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "v2.14.3"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}

      - name: Upload darwin binaries for notarization
        # Required input for the sign-macos workflow (when activated).
        # Leaving the upload active even when notarization is disabled
        # is harmless — the artifacts expire in 7 days.
        uses: actions/upload-artifact@v4
        with:
          name: lw_darwin_amd64
          path: dist/lw_darwin_amd64_v1/lw
          retention-days: 7
          if-no-files-found: warn

      - name: Upload darwin/arm64 binary for notarization
        uses: actions/upload-artifact@v4
        with:
          name: lw_darwin_arm64
          path: dist/lw_darwin_arm64_v8.0/lw
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # macOS notarization (dormant — activate per docs/release-notarization.md)
  #
  # Uncomment the block below + provision the five MACOS_* repo secrets,
  # and tagged releases will publish notarized darwin binaries that
  # don't trigger the syspolicyd reputation-check hang documented in
  # CLAUDE.md (the one that breaks `lw` invocations from project hooks
  # on fresh macOS installs).
