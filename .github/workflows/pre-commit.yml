name: Pre-commit

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tooling via mise
        uses: jdx/mise-action@v4
        with:
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (fallback for module cache)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
