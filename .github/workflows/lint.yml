name: Lint

on:
  workflow_call:
    inputs:
      os:
        description: "Runner OS (ubuntu-latest, macos-latest, …)"
        required: false
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so `git merge-base origin/main HEAD` resolves on
          # the runner — without this golangci-lint falls back to "show
          # all issues" mode and the baseline floods the run.
          fetch-depth: 0

      - name: Setup tooling via mise
        uses: jdx/mise-action@v4
        with:
          # Tool versions live in .mise.toml — golangci-lint, goreleaser,
          # go-junit-report, go itself.
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (fallback for module cache)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          # Ratchet only — existing violations are tombstoned in
          # internal/audits/golangci-baseline.json. Regressions in touched
          # files re-surface via --new-from-merge-base.
          args: --new-from-merge-base=origin/main --timeout=10m
