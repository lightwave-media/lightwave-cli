name: CI

# Orchestrator. Every individual job lives in its own reusable
# workflow under .github/workflows/ — this file just wires them up
# with the right matrix and the required-gate aggregation.
#
# Releases (.github/workflows/release.yml) call the same reusable
# workflows to keep `main` ↔ release semantics identical.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress runs for the same PR/SHA; never cancel on main.
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  checks: write

jobs:
  pre-commit:
    name: Pre-commit
    uses: ./.github/workflows/pre-commit.yml
    secrets: inherit

  codespell:
    name: Codespell
    uses: ./.github/workflows/codespell.yml
    secrets: inherit

  tidy-check:
    name: Tidy Check
    uses: ./.github/workflows/go-mod-tidy-check.yml
    secrets: inherit

  # ------------------------------------------------------------------
  # Schema-drift gate — dormant until LIGHTWAVE_CORE_TOKEN is provisioned.
  #
  # The reusable workflow at .github/workflows/schema-drift-check.yml
  # is fully written + tested; it checks out lightwave-cli + the
  # sibling lightwave-core schema repo, builds `lw`, and runs
  # `LW_CHECK_SCHEMA_STRICT=1 ./bin/lw check schema`. But
  # lightwave-core is private, so the default GITHUB_TOKEN cannot
  # check it out — the job fails with "Not Found" at the second
  # checkout step.
  #
  # To activate:
  #   1. Generate a fine-grained PAT (or use a GitHub App) with
  #      `Contents: Read` on lightwave-media/lightwave-core.
  #   2. Add as repo secret `LIGHTWAVE_CORE_TOKEN`.
  #   3. Edit schema-drift-check.yml to use that token in the
  #      lightwave-core checkout step's `token:` input.
  #   4. Uncomment the block below.
  #
  # Until then, schema-drift is enforced informally via the local
  # `lw check schema` invocation and the `lw check schema --strict`
  # behaviour added in this PR.
  #
  # schema-drift:
  #   name: Schema Drift
  #   uses: ./.github/workflows/schema-drift-check.yml
  #   secrets: inherit

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    with:
      os: ubuntu-latest

  base-test:
    name: Tests
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    uses: ./.github/workflows/base-test.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}

  build:
    name: Build
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, goos: linux,   goarch: amd64 }
          - { os: ubuntu-latest, goos: linux,   goarch: arm64 }
          - { os: ubuntu-latest, goos: darwin,  goarch: amd64 }
          - { os: ubuntu-latest, goos: darwin,  goarch: arm64 }
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      goos: ${{ matrix.goos }}
      goarch: ${{ matrix.goarch }}

  gate:
    name: CI Required Gate
    if: always()
    needs: [pre-commit, codespell, tidy-check, lint, base-test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          HAS_FAILURE: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$HAS_FAILURE" == "true" ]]; then
            echo "::error::One or more upstream jobs failed or were cancelled"
            exit 1
          fi
