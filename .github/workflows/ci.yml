name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tooling via mise
        uses: jdx/mise-action@v4
        with:
          # Tool versions live in .mise.toml.
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (fallback for caching)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git merge-base origin/main HEAD` resolves
          # on the runner — without this, golangci-lint falls back to
          # "show all issues" mode and the baseline floods the run.
          fetch-depth: 0

      - name: Setup tooling via mise
        uses: jdx/mise-action@v4
        with:
          # Tool versions live in .mise.toml.
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (fallback for caching)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          # Ratchet only — existing violations are tombstoned in
          # internal/audits/golangci-baseline.json. Regressions in
          # touched files re-surface via --new-from-merge-base.
          # Note: only-new-issues=true would conflict with --new* args
          # (the action enforces "pick one or the other"). The explicit
          # --new-from-merge-base flag lets devs run the same command
          # locally and stays version-stable.
          args: --new-from-merge-base=origin/main --timeout=10m

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tooling via mise
        uses: jdx/mise-action@v4
        with:
          # Tool versions live in .mise.toml.
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (fallback for caching)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./cmd/lw

      - name: Vet
        run: go vet ./...

      - name: Test with JUnit output
        # Pipe through go-junit-report (installed via .mise.toml) so the
        # JUnit XML report renders in the GitHub Actions summary.
        # `set -o pipefail` ensures the step's exit code reflects `go test`
        # failures, not just the report writer.
        run: |
          set -o pipefail
          go test -v ./... 2>&1 | tee test-output.txt | mise exec -- go-junit-report -set-exit-code > test-results.xml

      - name: Upload JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: test-results.xml
          detailed_summary: 'true'
          include_time_in_summary: 'true'
          group_suite: 'true'

  gate:
    name: CI Required Gate
    if: always()
    needs: [pre-commit, lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          HAS_FAILURE: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$HAS_FAILURE" == "true" ]]; then
            echo "::error::One or more upstream jobs failed or were cancelled"
            exit 1
          fi
