version: 2

builds:
  - main: ./cmd/lw
    binary: lw
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lightwave-media/lightwave-cli/internal/version.Version={{.Version}}
      - -X github.com/lightwave-media/lightwave-cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/lightwave-media/lightwave-cli/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  # Auto-generate from conventional commits; CHANGELOG.md is the
  # human-curated complement that the release body links to.
  sort: asc
  filters:
    exclude:
      - "^wip:"
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"

release:
  # GitHub release body: prepend a pointer to the human-curated
  # changelog so consumers can find the why-context.
  header: |
    See [`CHANGELOG.md`](https://github.com/{{ .Env.GITHUB_REPOSITORY }}/blob/{{ .Tag }}/CHANGELOG.md)
    for the human-curated release notes. The commit log below is
    auto-generated from conventional commits.

brews:
  - name: lw
    repository:
      owner: lightwave-media
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/lightwave-media/lightwave-cli"
    description: "LightWave CLI - Task management and platform operations"
    license: "MIT"
    test: |
      assert_match "lw version", shell_output("#{bin}/lw version")
