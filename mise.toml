# mise tool version pins — see https://mise.jdx.dev
#
# One source of truth for Go, Node, Python/pre-commit, and Go-tool versions
# across local dev + CI. `mise install` in this dir resolves everything.
# CI invokes the same pins via `jdx/mise-action@v4` so CI and local cannot drift.
#
# Why pinned (vs `latest`):
#   - Reproducibility — a new lint rule shouldn't break CI silently
#   - golangci-lint v2 ↔ config schema coupling — the v2.5.0 config in
#     `.golangci.yml` won't parse under v3 if/when it lands
#   - goreleaser config schema versions matter for the release pipeline

[tools]
go = "1.24"
node = "24"
python = "3.12"
"pipx:pre-commit" = "4.2.0"
# Pin via ubi: backend (direct from GitHub releases) — the default
# aqua: backend has had intermittent 400s on the registry endpoint.
"ubi:golangci/golangci-lint" = "v2.5.0"
"ubi:goreleaser/goreleaser" = "v2.15.4"
"ubi:jstemmer/go-junit-report" = "v2.1.0"

# --- Local CI tasks -------------------------------------------------------
# `mise run ci` mirrors the pre-push gate (.pre-commit-config.yaml) + Makefile
# so the same checks run locally. Tools resolve to the pins above. Personal
# local layer; the pre-commit framework + GH workflows are unchanged.
[tasks.pre-commit]
description = "Run pre-commit on all files (matches CI pre-commit job)"
run = "pre-commit run --all-files --show-diff-on-failure"

[tasks.fmt-check]
description = "gofmt check"
run = 'test -z "$(gofmt -l .)"'

[tasks.vet]
description = "go vet"
run = "go vet ./..."

[tasks.lint]
description = "golangci-lint (ratcheted to new code vs origin/main — matches the baseline)"
# Strip inherited git location vars (see [tasks.test]). --new-from-merge-base
# shells out to git to compute the diff; under the pre-push gate an inherited
# GIT_DIR points that at the wrong repo, yielding a garbage diff and spurious
# "new" findings. Unset so the ratchet compares against the real worktree.
run = "unset GIT_DIR GIT_WORK_TREE GIT_INDEX_FILE GIT_OBJECT_DIRECTORY GIT_COMMON_DIR GIT_PREFIX GIT_CONFIG_PARAMETERS; golangci-lint run --new-from-merge-base=origin/main --timeout=10m ./..."

[tasks.build]
description = "Build lw"
run = "go build ./cmd/lw"

[tasks.test]
description = "go test (race + shuffle, matches CI)"
# Strip inherited git location vars before testing. When this task runs from the
# pre-push gate, git exports GIT_DIR/GIT_WORK_TREE/etc. pointing at the real
# repo; tests that shell out to `git` in temp dirs (internal/git,
# internal/docsfactory, …) would otherwise target — and corrupt — the canonical
# checkout. This blanket guard covers raw-exec test helpers that don't go
# through the internal/git wrapper. Same pattern as scripts/precommit/hooks_test.sh.
run = "unset GIT_DIR GIT_WORK_TREE GIT_INDEX_FILE GIT_OBJECT_DIRECTORY GIT_COMMON_DIR GIT_PREFIX GIT_CONFIG_PARAMETERS; go test -race -shuffle=on ./..."

[tasks.ci]
description = "Local CI: fmt-check + vet + lint + build + test"
depends = ["fmt-check", "vet", "lint", "build", "test"]

[tasks.release-cycle]
description = "Release-train gate report (dry-run) for all pinned repos (ADR-0032)"
run = "bash dev/release-cycle/release-cycle.sh"
